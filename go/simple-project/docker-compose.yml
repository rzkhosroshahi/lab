  #     DB_NAME: "postgres"
  #     DB_SSLMODE: "disable"
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped
  test-db:
    container_name: "workoutDB_test"
    image: postgres:12.4-alpine
    volumes:
      - "./database/postgres-test-data:/var/lib/postgresql/data:rw"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    restart: unless-stopped


